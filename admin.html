<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Nocturna</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <section class="container" style="padding: 60px 0;">
    <div class="section-head">
      <div>
        <div class="section-eyebrow mono">Administration</div>
        <h2 class="section-title">Coulisses</h2>
      </div>
    </div>

    <!-- CRÉATION D'ÉVÉNEMENT -->
    <div style="border:1px solid var(--ink-line);padding:32px;margin-bottom:32px;background:var(--ink-soft);">
      <h3 style="font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:20px;">Créer une <em class="serif-italic text-blood">soirée</em></h3>
      <div id="createAlert"></div>
      <form id="createForm" class="form">
        <div class="field">
          <label>Titre</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Date & heure</label>
            <input type="datetime-local" id="date" required>
          </div>
          <div class="field">
            <label>Places maximum</label>
            <input type="number" id="max_people" min="1" required>
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>Ville</label>
            <input type="text" id="city" required>
          </div>
          <div class="field">
            <label>Département</label>
            <input type="text" id="department" required placeholder="ex : 75">
          </div>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="description" placeholder="Une nuit pour..."></textarea>
        </div>
        <div class="field">
          <label>Images du lieu (jpg, png, webp · 8 Mo max chacune)</label>
          <input type="file" id="images" multiple accept="image/jpeg,image/png,image/webp,image/avif">
        </div>
        <button type="submit" class="btn btn-blood" id="createBtn">Publier la soirée</button>
      </form>
    </div>

    <!-- GESTION DES FORMULES -->
    <div style="border:1px solid var(--ink-line);padding:32px;margin-bottom:32px;background:var(--ink-soft);">
      <h3 style="font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:20px;">Formules de réservation</h3>
      <p class="text-mute mb-4" style="font-size:0.9rem;">Modifiez ici les 5 formules. Le prix est en centimes (15€ = 1500).</p>
      <div id="formulasAdmin"></div>
    </div>

    <!-- LISTE DES SOIRÉES -->
    <div style="border:1px solid var(--ink-line);padding:32px;background:var(--ink-soft);">
      <h3 style="font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:20px;">Soirées publiées</h3>
      <div id="eventsAdmin"></div>
    </div>
  </section>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    renderNav('admin');
    if (!requireAuth()) {}
    if (!auth.isAdmin()) {
      document.body.innerHTML = '<div class="container"><div class="empty">Accès réservé aux administrateurs.</div></div>';
    }

    // -------- CRÉATION ÉVÉNEMENT
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('createAlert');
      clearAlert(alertBox);
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Publication…';

      const fd = new FormData();
      fd.append('title', document.getElementById('title').value);
      fd.append('description', document.getElementById('description').value);
      // datetime-local renvoie "2026-06-12T22:00" → on convertit en ISO avec timezone locale
      const dt = document.getElementById('date').value;
      fd.append('date', new Date(dt).toISOString());
      fd.append('city', document.getElementById('city').value);
      fd.append('department', document.getElementById('department').value);
      fd.append('max_people', document.getElementById('max_people').value);

      const files = document.getElementById('images').files;
      for (const f of files) fd.append('images', f);

      try {
        await apiFetch('/events', { method: 'POST', body: fd });
        showAlert(alertBox, 'Soirée créée avec succès !', 'success');
        document.getElementById('createForm').reset();
        loadEvents();
      } catch (err) {
        showAlert(alertBox, err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Publier la soirée';
      }
    });

    // -------- FORMULES
    async function loadFormulas() {
      const container = document.getElementById('formulasAdmin');
      try {
        const formulas = await apiFetch('/formulas');
        container.innerHTML = formulas.map(f => `
          <div style="display:grid;grid-template-columns:60px 1fr 1fr 140px auto;gap:12px;align-items:end;padding:14px 0;border-top:1px solid var(--ink-line);" data-id="${f.id}">
            <div class="mono text-mute" style="padding-bottom:14px;">#${f.id}</div>
            <div class="field"><label>Nom</label><input type="text" class="f-name" value="${f.name.replace(/"/g, '&quot;')}"></div>
            <div class="field"><label>Description</label><input type="text" class="f-desc" value="${(f.description || '').replace(/"/g, '&quot;')}"></div>
            <div class="field"><label>Prix (centimes)</label><input type="number" class="f-price" value="${f.price_cents}" min="0"></div>
            <button class="btn btn-ghost f-save" style="padding:14px 18px;">Enregistrer</button>
          </div>
        `).join('');

        container.querySelectorAll('.f-save').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const row = e.target.closest('[data-id]');
            const id = row.dataset.id;
            btn.disabled = true;
            btn.textContent = '…';
            try {
              await apiFetch(`/formulas/${id}`, {
                method: 'PATCH',
                body: {
                  name: row.querySelector('.f-name').value,
                  description: row.querySelector('.f-desc').value,
                  price_cents: parseInt(row.querySelector('.f-price').value),
                },
              });
              btn.textContent = 'OK ✓';
              setTimeout(() => { btn.textContent = 'Enregistrer'; btn.disabled = false; }, 1200);
            } catch (err) {
              alert(err.message);
              btn.textContent = 'Enregistrer';
              btn.disabled = false;
            }
          });
        });
      } catch (err) {
        container.innerHTML = `<div class="text-mute">${err.message}</div>`;
      }
    }

    // -------- LISTE DES ÉVÉNEMENTS
    async function loadEvents() {
      const container = document.getElementById('eventsAdmin');
      try {
        const events = await apiFetch('/events?upcoming_only=false');
        if (!events.length) {
          container.innerHTML = '<div class="text-mute">Aucune soirée pour l\'instant.</div>';
          return;
        }
        container.innerHTML = events.map(ev => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--ink-line);gap:14px;flex-wrap:wrap;">
            <div style="flex:1;min-width:220px;">
              <div class="mono text-mute">${formatDate(ev.date)} · ${ev.department}</div>
              <div style="font-family:'Fraunces',serif;font-size:1.2rem;">${ev.title}</div>
              <div class="text-mute" style="font-size:0.88rem;">${ev.city} · ${ev.seats_taken}/${ev.max_people} places</div>
            </div>
            <div style="display:flex;gap:8px;">
              <a class="btn btn-ghost" href="event.html?id=${ev.id}" style="padding:10px 16px;font-size:0.8rem;">Voir</a>
              <button class="btn btn-ghost del-btn" data-id="${ev.id}" style="padding:10px 16px;font-size:0.8rem;border-color:var(--blood);color:var(--blood);">Supprimer</button>
            </div>
          </div>
        `).join('');

        container.querySelectorAll('.del-btn').forEach(b => {
          b.addEventListener('click', async () => {
            if (!confirm('Supprimer cette soirée ?')) return;
            try {
              await apiFetch(`/events/${b.dataset.id}`, { method: 'DELETE' });
              loadEvents();
            } catch (err) { alert(err.message); }
          });
        });
      } catch (err) {
        container.innerHTML = `<div class="text-mute">${err.message}</div>`;
      }
    }

    loadFormulas();
    loadEvents();
  </script>
</body>
</html>
