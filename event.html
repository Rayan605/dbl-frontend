<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soirée — Liste Party</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
<div id="nav"></div>
<div class="container"><div id="alertBox"></div></div>
<div id="pageContent" class="container"><div class="empty-state">Chargement...</div></div>

<div id="footer"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
renderFooter();
  renderNav('home');
const params  = new URLSearchParams(window.location.search);
const eventId = params.get('id');
if (params.get('cancelled')) showAlert(document.getElementById('alertBox'), 'Paiement annulé. Aucun débit effectué.', 'info');

let selectedFormulaId = null;
let selectedFormuleFree = false;

async function load() {
  const pc = document.getElementById('pageContent');
  try {
    const [ev, formulas] = await Promise.all([apiFetch(`/events/${eventId}`), apiFetch('/formulas')]);
    render(ev, formulas);
  } catch(err) { pc.innerHTML = `<div class="empty-state">Erreur : ${err.message}</div>`; }
}

function render(ev, formulas) {
  const full = ev.seats_left <= 0;
  const resaClosed = ev.reservations_open === 0;
  const urgent = !full && !resaClosed && ev.seats_left <= 10;
  document.title = `${ev.title} — Liste Party`;
  const pc = document.getElementById('pageContent');
  pc.innerHTML = `
    <section class="event-hero-grid">
      <div class="fade-up">
        ${ev.images.length
          ? `<img class="gallery-main" id="mainImg" src="${ev.images[0].url}" alt="${ev.title}">
             ${ev.images.length > 1 ? `<div class="gallery-thumbs">${ev.images.map((img, i) =>
               `<img class="gallery-thumb ${i===0?'active':''}" data-idx="${i}" src="${img.url}">`).join('')}</div>` : ''}`
          : `<div class="gallery-main" style="display:flex;align-items:center;justify-content:center;color:var(--ghost);font-family:'Playfair Display',serif;font-style:italic;font-size:2rem;">Liste Party</div>`
        }
      </div>
      <div class="fade-up d1">
        <div class="mono text-gold mb-2">${ev.department} · ${ev.city}</div>
        <h1 class="event-info-title">${ev.title}</h1>
        ${ev.description ? `<p class="event-desc-text">${ev.description}</p>` : ''}
        <div class="meta-strip">
          <div class="meta-item"><div class="mono">Date</div><div class="meta-val">${formatDate(ev.date)}</div></div>
          <div class="meta-item"><div class="mono">Heure</div><div class="meta-val">${formatTime(ev.date)}</div></div>
          <div class="meta-item"><div class="mono">Lieu</div><div class="meta-val">${ev.city}</div></div>
          <div class="meta-item">
            <div class="mono">Places</div>
            <div class="meta-val ${full ? 'urgent' : ''}">
              ${full ? 'COMPLET' : urgent ? `🔥 ${ev.seats_left} restantes` : `${ev.seats_left} / ${ev.max_people}`}
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section fade-up d2">
      <div class="section-head">
        <div>
          <div class="section-eyebrow mono">Une place, une formule</div>
          <h2 class="section-title">Choisis ta <span class="gold">formule</span></h2>
        </div>
      </div>

      <div class="formulas-grid" id="formulasList">
        ${formulas.map(f => {
          const isFree = f.price_cents === 0;
          const userGender = auth.user ? auth.user.gender : null;
          // Formule à 0€ : visible mais grisée pour les non-filles
          const unavailFree = isFree && userGender !== 'F';
          return `
            <div class="formula-card${unavailFree ? ' formula-unavail' : ''}" data-id="${f.id}" data-price="${f.price_cents}" data-free="${isFree}">
              <div class="formula-left">
                <div class="formula-name">${f.name}${isFree ? ' <span style="background:#ff69b4;color:#fff;font-size:0.55rem;padding:2px 7px;border-radius:2px;vertical-align:middle;font-family:Space Mono,monospace;letter-spacing:0.06em;">GRATUIT FILLES</span>' : ''}</div>
                <div class="formula-desc">${f.description || ''}${isFree ? '<br><span style="color:#ff69b4;font-size:0.8rem;">✦ Entrée gratuite pour les filles</span>' : ''}</div>
                ${f.max_guests > 0 ? `<div class="formula-guests">✦ Tu peux inviter jusqu'à ${f.max_guests} personne${f.max_guests > 1 ? 's' : ''}</div>` : ''}
              </div>
              <div class="formula-right">
                <div class="formula-price" style="${isFree ? 'color:#ff69b4;' : ''}">${isFree ? 'GRATUIT' : formatPrice(f.price_cents)}</div>
                <div class="formula-check">✓</div>
              </div>
            </div>`;
        }).join('')}
      </div>

      <div id="resAlert" style="margin-top:16px;"></div>

      ${resaClosed ? '<div class="alert info" style="text-align:center;font-weight:600;">🔒 Réservations fermées pour cette soirée.</div>' : `
      <button id="reserveBtn" class="btn btn-gold btn-block btn-lg" ${full ? 'disabled' : ''} style="margin-top:16px;">
        ${full ? 'Soirée complète' : 'Réserver et payer →'}
      </button>`}
      <p class="mono text-smoke text-center mt-2" style="font-size:0.65rem;">
        1 place par personne · Paiement 100% sécurisé · Stripe · CB acceptées
      </p>
    </section>
  `;

  // Galerie
  document.querySelectorAll('.gallery-thumb').forEach(t => {
    t.addEventListener('click', () => {
      document.getElementById('mainImg').src = ev.images[+t.dataset.idx].url;
      document.querySelectorAll('.gallery-thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });

  // Sélection formule (radio-like)
  document.querySelectorAll('.formula-card').forEach(el => {
    el.addEventListener('click', () => {
      if (el.classList.contains('formula-unavail')) return; // formule gratuite non dispo pour ce genre
      document.querySelectorAll('.formula-card').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selectedFormulaId = +el.dataset.id;
      selectedFormuleFree = el.dataset.free === 'true';
    });
  });

  document.getElementById('reserveBtn').addEventListener('click', reserve);
}

async function reserve() {
  const alertBox = document.getElementById('resAlert');
  clearAlert(alertBox);
  if (!auth.isLoggedIn()) {
    window.location.href = `login.html?next=${encodeURIComponent(location.pathname + location.search)}`;
    return;
  }
  if (!selectedFormulaId) {
    showAlert(alertBox, 'Choisis une formule avant de continuer.');
    return;
  }
  const btn = document.getElementById('reserveBtn');
  btn.disabled = true;

  // Formule gratuite pour les filles → pas de Stripe
  if (selectedFormuleFree && auth.user && auth.user.gender === 'F') {
    btn.innerHTML = '<span class="spinner"></span> Réservation en cours...';
    try {
      await apiFetch('/reservations/free', {
        method: 'POST',
        body: { event_id: +eventId, formula_id: selectedFormulaId, quantity: 1 }
      });
      window.location.href = `my-reservations.html`;
    } catch(err) {
      showAlert(alertBox, err.message);
      btn.disabled = false;
      btn.innerHTML = 'Réserver →';
    }
    return;
  }

  btn.innerHTML = '<span class="spinner"></span> Redirection Stripe...';
  try {
    const data = await apiFetch('/reservations/checkout', {
      method: 'POST',
      body: { event_id: +eventId, formula_id: selectedFormulaId, quantity: 1 }
    });
    window.location.href = data.checkout_url;
  } catch(err) {
    showAlert(alertBox, err.message);
    btn.disabled = false;
    btn.innerHTML = 'Réserver et payer →';
  }
}

load();
</script>
</body></html>
