<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Liste Party</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
<div id="nav"></div>
<div class="container">
  <div class="auth-wrap fade-up">
    <div class="mono text-gold mb-2">Connexion</div>
    <h1 class="auth-title">Content de te <em>revoir</em>.</h1>
    <p class="auth-sub">T'es toujours sur la liste. Rentre.</p>
    <div id="alertBox"></div>
    <form id="loginForm" class="form">
      <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="email"></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="password" required autocomplete="current-password"></div>
      <button type="submit" class="btn btn-gold btn-block" id="submitBtn">Connexion →</button>
    </form>
    <p class="auth-switch">Pas encore de compte ? <a href="register.html">Rejoindre la liste</a></p>
  </div>
</div>
<script src="js/config.js"></script><script src="js/api.js"></script>
<script>
  renderFooter();
  renderNav('login');
  const next = new URLSearchParams(location.search).get('next') || 'index.html';
  if (auth.isLoggedIn()) window.location.href = next;
  const form = document.getElementById('loginForm');
  const alertBox = document.getElementById('alertBox');
  const btn = document.getElementById('submitBtn');
  form.addEventListener('submit', async e => {
    e.preventDefault(); clearAlert(alertBox);
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Connexion...';
    try {
      const data = await apiFetch('/auth/login', { method:'POST', body:{ email: document.getElementById('email').value, password: document.getElementById('password').value } });
      auth.setSession(data.access_token, data.user);
      window.location.href = next;
    } catch(err) { showAlert(alertBox, err.message); btn.disabled=false; btn.textContent='Connexion →'; }
  });
</script>
<div id="footer"></div>
</body></html>
