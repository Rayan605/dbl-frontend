<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription — Liste Party</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
<div id="nav"></div>
<div class="container">
  <div class="auth-wrap fade-up" style="max-width:540px;">
    <div class="mono text-gold mb-2">Inscription</div>
    <h1 class="auth-title">Bienvenue<br><em class="text-gold">dans le bon.</em></h1>
    <p class="auth-sub">Remplis, t'es mis sur la liste et t'as accès à tout.</p>
    <div id="alertBox"></div>
    <form id="regForm" class="form">
      <div class="form-row">
        <div class="field"><label>Prénom</label><input type="text" id="first_name" required></div>
        <div class="field"><label>Nom</label><input type="text" id="last_name" required></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="email"></div>
        <div class="field">
          <label>Sexe</label>
          <select id="gender" required>
            <option value="">—</option>
            <option value="F">Femme</option>
            <option value="M">Homme</option>
            <option value="X">Autre</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Insta / Snap <span style="color:var(--red);">*</span></label>
        <input type="text" id="social" required placeholder="@ton_pseudo" autocomplete="off">
        <span style="font-size:0.75rem;color:var(--smoke);margin-top:3px;">Ton compte Instagram ou Snapchat — obligatoire.</span>
      </div>
      <div class="field">
        <label>Mot de passe <span style="color:var(--red);">*</span></label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
        <span style="font-size:0.75rem;color:var(--smoke);margin-top:3px;">8 caractères minimum.</span>
      </div>
      <button type="submit" class="btn btn-gold btn-block" id="submitBtn">Je veux être dans le bon →</button>
    </form>
    <p class="auth-switch">Déjà sur la liste ? <a href="login.html">Se connecter</a></p>
  </div>
</div>
<script src="js/config.js"></script><script src="js/api.js"></script>
<script>
  renderNav('register');
  if (auth.isLoggedIn()) window.location.href = 'index.html';
  const form = document.getElementById('regForm');
  const alertBox = document.getElementById('alertBox');
  const btn = document.getElementById('submitBtn');
  form.addEventListener('submit', async e => {
    e.preventDefault(); clearAlert(alertBox);
    const social = document.getElementById('social').value.trim();
    if (!social) { showAlert(alertBox, 'Ton insta ou snap est obligatoire.'); return; }
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Création du compte...';
    try {
      const data = await apiFetch('/auth/register', { method:'POST', body:{
        email:      document.getElementById('email').value.trim(),
        password:   document.getElementById('password').value,
        first_name: document.getElementById('first_name').value.trim(),
        last_name:  document.getElementById('last_name').value.trim(),
        gender:     document.getElementById('gender').value,
        social,
      }});
      auth.setSession(data.access_token, data.user);
      window.location.href = 'index.html';
    } catch(err) { showAlert(alertBox, err.message); btn.disabled=false; btn.textContent="Je veux être dans le bon →"; }
  });
</script>
</body></html>
