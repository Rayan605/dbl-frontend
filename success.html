<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réservation confirmée — Nocturna</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <div class="auth-wrap fade-up" style="text-align:center;">
      <div class="mono text-mute mb-2">Paiement validé</div>
      <h1 class="auth-title">Vous êtes <em class="serif-italic text-blood">in</em>.</h1>
      <p class="auth-sub" id="confirmText">On vérifie votre paiement…</p>

      <div id="resCard"></div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;">
        <a href="my-reservations.html" class="btn btn-primary">Mes réservations</a>
        <a href="index.html" class="btn btn-ghost">Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    renderNav();
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    async function confirm() {
      if (!sessionId) {
        document.getElementById('confirmText').textContent = 'Aucune session à confirmer.';
        return;
      }
      if (!auth.isLoggedIn()) {
        document.getElementById('confirmText').innerHTML = 'Connectez-vous pour voir le détail de votre réservation. <br><a href="login.html" class="text-blood">Se connecter</a>';
        return;
      }
      try {
        const res = await apiFetch(`/reservations/confirm?session_id=${encodeURIComponent(sessionId)}`);
        document.getElementById('confirmText').textContent =
          res.status === 'paid'
            ? 'Votre place est réservée. À très vite.'
            : 'Votre paiement est en cours de traitement.';
        document.getElementById('resCard').innerHTML = `
          <div style="margin-top:24px;padding:20px;border:1px solid var(--ink-line);text-align:left;">
            <div class="mono text-mute mb-1">${formatDate(res.event_date)}</div>
            <h3 style="font-family:'Fraunces',serif;font-size:1.4rem;margin-bottom:8px;">${res.event_title}</h3>
            <div>${res.formula_name} · ${res.quantity} place${res.quantity > 1 ? 's' : ''}</div>
            ${res.amount_paid_cents ? `<div class="text-blood" style="font-family:'Fraunces',serif;font-size:1.6rem;margin-top:8px;">${formatPrice(res.amount_paid_cents)}</div>` : ''}
          </div>
        `;
      } catch (err) {
        document.getElementById('confirmText').textContent = 'Erreur de confirmation : ' + err.message;
      }
    }

    confirm();
  </script>
</body>
</html>
