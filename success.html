<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paiement confirmé — Liste Party</title>
  <link rel="stylesheet" href="css/styles.css">
</head><body>
<div id="nav"></div>
<div class="container" style="max-width:500px;padding:60px 28px;">
  <div id="pageContent" class="empty-state"><span class="spinner"></span> Confirmation en cours...</div>
</div>

<script src="js/config.js"></script><script src="js/api.js"></script>
<script>
renderFooter();
  renderNav('me');
const sessionId = new URLSearchParams(location.search).get('session_id');

async function confirm() {
  const pc = document.getElementById('pageContent');
  pc.className = '';
  if (!sessionId) { pc.innerHTML = '<div class="alert">Session introuvable.</div>'; return; }
  if (!auth.isLoggedIn()) {
    pc.innerHTML = `<h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--white);margin-bottom:12px;">T'es dans le bon.</h1>
      <p class="text-smoke mb-4">Paiement reçu. Connecte-toi pour accéder à ton QR code.</p>
      <a href="login.html" class="btn btn-gold btn-block">Se connecter →</a>`;
    return;
  }
  try {
    const res = await apiFetch(`/reservations/confirm?session_id=${encodeURIComponent(sessionId)}`);
    const paid = res.status === 'paid';

    pc.innerHTML = `
      <div class="mono text-lime mb-2">✓ Paiement validé</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:2.6rem;color:var(--white);margin-bottom:10px;line-height:1;">T'es <span style="color:var(--gold);font-style:italic;">dans le bon</span>.</h1>
      <p class="text-smoke" style="margin-bottom:28px;">${paid ? 'Ta place est réservée. On se voit là-bas.' : 'Paiement en cours de traitement.'}</p>
    `;

    if (paid && res.qr_token) {
      try {
        const qrData = await apiFetch(`/reservations/${res.id}/qr`);
        const qrDiv = document.createElement('div');
        pc.appendChild(qrDiv);
        renderQrTicket(qrDiv, qrData, false);
      } catch(e) { /* QR pas critique */ }
    }

    const btnDiv = document.createElement('div');
    btnDiv.style = 'display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;';
    btnDiv.innerHTML = `
      <a href="my-reservations.html" class="btn btn-gold">Ma liste →</a>
      <a href="index.html" class="btn btn-outline">Retour</a>
    `;
    pc.appendChild(btnDiv);
  } catch(err) {
    pc.innerHTML = `<div class="alert">${err.message}</div><div style="margin-top:16px;"><a href="my-reservations.html" class="btn btn-outline">Voir mes réservations</a></div>`;
  }
}

confirm();
</script>
<div id="footer"></div>
</body></html>
