<!doctype html>
<html lang="fr"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Scanner — Liste Party</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; background: var(--void); }

    /* ── HEADER ───────────────────────────────────────────── */
    .sc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--panel); border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .sc-brand { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 900; color: var(--white); display: flex; align-items: center; gap: 8px; }
    .sc-badge { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--lime); background: rgba(181,255,71,0.1); border: 1px solid var(--lime); padding: 3px 8px; border-radius: 2px; white-space: nowrap; }

    /* ── MAIN AREA ────────────────────────────────────────── */
    .sc-main {
      flex: 1; display: flex; flex-direction: column;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 14px; gap: 10px;
      max-width: 520px; width: 100%; margin: 0 auto;
    }

    /* ── VIEWFINDER + TOAST overlay ───────────────────────── */
    .viewfinder-wrap {
      position: relative; border-radius: 8px; overflow: hidden;
      background: #000; flex-shrink: 0;
      /* hauteur fixe pour que la caméra ne reflow pas */
      height: min(55vw, 280px);
    }
    #video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .vf-guide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .vf-square {
      width: min(44vw, 200px); height: min(44vw, 200px);
      border: 2px solid var(--lime); border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.42);
      transition: border-color 0.15s;
    }
    .vf-square.ok  { border-color: var(--lime); }
    .vf-square.bad { border-color: var(--red); }
    .vf-square.warn{ border-color: var(--gold); }

    /* Toast plein-écran (overlayant la caméra) */
    .scan-toast {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.12s;
      text-align: center;
    }
    .scan-toast.show { opacity: 1; }
    .scan-toast.ok      { background: rgba(9,60,9,0.92); }
    .scan-toast.ok-girl { background: rgba(140,10,80,0.92); }
    .vf-square.ok-girl  { border-color: #ff69b4; box-shadow: 0 0 0 9999px rgba(0,0,0,0.42); }
    .toast-badge.ok-girl { background: #ff69b4; color: #fff; }
    .scan-toast.bad  { background: rgba(80,8,8,0.92); }
    .scan-toast.warn { background: rgba(70,55,5,0.92); }

    .toast-icon {
      font-size: 3rem; line-height: 1;
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .toast-name  { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--white); font-weight: 900; line-height: 1.1; }
    .toast-sub   { font-size: 0.85rem; color: rgba(255,255,255,0.75); }
    .toast-badge { font-family: 'Space Mono', monospace; font-size: 0.65rem; padding: 4px 10px; border-radius: 2px; margin-top: 4px; }
    .toast-badge.ok   { background: var(--lime); color: var(--void); }
    .toast-badge.bad  { background: var(--red);  color: var(--white); }
    .toast-badge.warn { background: var(--gold); color: var(--void); }

    .toast-cooldown {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
    }

    /* ── CAM BTN ──────────────────────────────────────────── */
    .cam-btns { display: flex; gap: 8px; }
    .cam-btns .btn { flex: 1; font-size: 0.82rem; padding: 11px 12px; }

    /* ── INPUT MANUEL ─────────────────────────────────────── */
    .manual-wrap { display: flex; gap: 8px; }
    .manual-input {
      flex: 1; background: var(--panel); border: 1px solid var(--ghost);
      color: var(--bone); padding: 12px 14px;
      font-family: 'Space Mono', monospace; font-size: 0.82rem;
      border-radius: var(--r); min-width: 0;
    }
    .manual-input:focus { outline: none; border-color: var(--gold); }
    .manual-input::placeholder { color: var(--ghost); }

    /* ── HISTORY ──────────────────────────────────────────── */
    .history-box {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--r); overflow: hidden; flex-shrink: 0;
    }
    .history-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px; border-bottom: 1px solid var(--line);
    }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-bottom: 1px solid var(--line);
      font-size: 0.82rem;
    }
    .history-item:last-child { border-bottom: none; }
    .h-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .h-dot.ok   { background: var(--lime); }
    .h-dot.bad  { background: var(--red); }
    .h-dot.warn { background: var(--gold); }
    .h-name  { color: var(--white); font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .h-info  { color: var(--smoke); font-size: 0.75rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .h-time  { color: var(--smoke); font-family: 'Space Mono', monospace; font-size: 0.6rem; flex-shrink: 0; }

    /* ── ACCESS DENIED ────────────────────────────────────── */
    #accessDenied { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 32px; text-align: center; }
    canvas { display: none; }
  </style>
</head>
<body>

<div class="sc-header">
  <div class="sc-brand"><span class="brand-dot"></span> Liste Party</div>
  <span class="sc-badge">📷 Scanner</span>
</div>

<div id="accessDenied" style="display:none;">
  <div class="empty-state">Accès refusé. Ce compte n'a pas les droits scanner.</div>
  <a href="index.html" class="btn btn-outline">Retour</a>
</div>

<div class="sc-main" id="scannerBody" style="display:none;">

  <!-- Viewfinder caméra + toast overlay -->
  <div class="viewfinder-wrap" id="viewfinderWrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="vf-guide"><div class="vf-square" id="vfSquare"></div></div>

    <div class="scan-toast" id="scanToast">
      <div class="toast-icon" id="toastIcon">?</div>
      <div class="toast-name"  id="toastName">—</div>
      <div class="toast-sub"   id="toastSub">—</div>
      <div class="toast-badge" id="toastBadge">—</div>
      <div class="toast-cooldown" id="toastCooldown"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Contrôles caméra -->
  <div class="cam-btns">
    <button id="camBtn"     class="btn btn-ghost">📷 Activer la caméra</button>
    <button id="stopCamBtn" class="btn btn-ghost" style="display:none;">⏹ Arrêter</button>
  </div>

  <!-- Saisie manuelle -->
  <div class="manual-wrap">
    <input id="manualInput" class="manual-input" type="text"
      placeholder="Token QR manuel…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="manualBtn" class="btn btn-gold" style="padding:12px 16px;">→</button>
  </div>

  <!-- Historique session -->
  <div class="history-box">
    <div class="history-head">
      <span class="mono text-smoke">Session</span>
      <span class="mono text-smoke" id="scanCount">0 scan</span>
    </div>
    <div id="historyList">
      <div style="padding:14px;text-align:center;color:var(--smoke);font-size:0.85rem;font-style:italic;">
        Aucun scan pour l'instant.
      </div>
    </div>
  </div>

</div><!-- /sc-main -->

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// ── Auth ───────────────────────────────────────────────────
if (!auth.isLoggedIn()) { window.location.href = 'login.html?next=scanner.html'; }
const user = auth.user;
if (!user || (!user.is_scanner && !user.is_admin)) {
  document.getElementById('accessDenied').style.display = 'flex';
} else {
  document.getElementById('scannerBody').style.display = 'flex';
}

// ── State ──────────────────────────────────────────────────
const COOLDOWN_MS = 2500;   // pause caméra après un scan réussi
let history      = [];
let videoStream  = null;
let scanning     = false;   // boucle tick active ?
let locked       = false;   // dans le cooldown post-scan
let cooldownTimer= null;
let cooldownEnd  = 0;

const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const vfSq    = document.getElementById('vfSquare');
const toast   = document.getElementById('scanToast');

// ── Toast ──────────────────────────────────────────────────
function showToast(data) {
  // Détecter si c est une fille via le payload (gender stocké dans la DB via le scan)
  const isGirl = data.valid && data.gender === 'F';
  const type = data.valid ? (isGirl ? 'ok-girl' : 'ok') : (data.already_scanned ? 'warn' : 'bad');

  document.getElementById('toastIcon').textContent =
    data.valid ? (isGirl ? '♀' : '✓') : (data.already_scanned ? '⚠' : '✕');
  document.getElementById('toastName').textContent =
    data.holder_name || (data.valid ? 'Valide' : 'Refusé');
  document.getElementById('toastSub').textContent =
    data.formula_name || data.event_title || '';
  const badge = document.getElementById('toastBadge');
  badge.className = `toast-badge ${type}`;
  badge.textContent = data.valid ? (isGirl ? '♀ ENTRÉE GRATUITE' : '✓ BIENVENUE') : (data.already_scanned ? '⚠ DÉJÀ SCANNÉ' : '✕ REFUSÉ');

  vfSq.className = `vf-square ${type}`;
  toast.className = `scan-toast show ${type}`;

  addHistory(data, type);
}

function hideToast() {
  toast.className = 'scan-toast';
  vfSq.className  = 'vf-square';
  document.getElementById('toastCooldown').textContent = '';
}

function startCooldown() {
  locked = true;
  cooldownEnd = Date.now() + COOLDOWN_MS;
  cooldownTimer = setInterval(() => {
    const remaining = Math.ceil((cooldownEnd - Date.now()) / 1000);
    if (remaining <= 0) {
      clearInterval(cooldownTimer);
      locked = false;
      hideToast();
      // Reprendre la lecture caméra si elle était active
      if (videoStream) {
        scanning = true;
        requestAnimationFrame(tick);
      }
    } else {
      document.getElementById('toastCooldown').textContent =
        `Prochain scan dans ${remaining}s`;
    }
  }, 100);
}

// ── History ────────────────────────────────────────────────
function addHistory(data, type) {
  const now = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  history.unshift({ data, type, time: now });
  if (history.length > 30) history.pop();

  document.getElementById('scanCount').textContent =
    `${history.length} scan${history.length > 1 ? 's' : ''}`;

  document.getElementById('historyList').innerHTML = history.map(h => `
    <div class="history-item">
      <div class="h-dot ${h.type}"></div>
      <div class="h-name">${h.data.holder_name || 'Inconnu'}</div>
      <div class="h-info">${h.data.formula_name || h.data.message || ''}</div>
      <div class="h-time">${h.time}</div>
    </div>
  `).join('');
}

// ── Scan ───────────────────────────────────────────────────
async function doScan(raw) {
  raw = raw.trim();
  if (!raw || locked) return;

  // Extraire le token du payload LP|RES|id|TOKEN|...
  let token = raw;
  const parts = raw.split('|');
  if (parts.length >= 4 && parts[0] === 'LP') token = parts[3];

  // Locker immédiatement + stopper la boucle caméra
  locked = true;
  scanning = false;

  try {
    const result = await apiFetch(`/scan/${encodeURIComponent(token)}`);
    showToast(result);
  } catch(err) {
    showToast({ valid: false, type: 'unknown', message: err.message, holder_name: null, formula_name: null });
  }

  document.getElementById('manualInput').value = '';
  startCooldown();
}

// ── Manuel ─────────────────────────────────────────────────
document.getElementById('manualBtn').addEventListener('click', () =>
  doScan(document.getElementById('manualInput').value));
document.getElementById('manualInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doScan(document.getElementById('manualInput').value);
});

// ── Caméra ─────────────────────────────────────────────────
document.getElementById('camBtn').addEventListener('click', async () => {
  if (locked) return;
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    video.srcObject = videoStream;
    document.getElementById('viewfinderWrap').style.display = '';
    document.getElementById('camBtn').style.display     = 'none';
    document.getElementById('stopCamBtn').style.display = '';
    scanning = true;
    requestAnimationFrame(tick);
  } catch(err) {
    alert('Caméra non disponible : ' + err.message);
  }
});

document.getElementById('stopCamBtn').addEventListener('click', stopCam);

function stopCam() {
  scanning = false;
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  video.srcObject = null;
  document.getElementById('camBtn').style.display     = '';
  document.getElementById('stopCamBtn').style.display = 'none';
  if (!locked) hideToast();
}

// Boucle de lecture QR — s'arrête dès qu'un code est trouvé
function tick() {
  if (!scanning || locked) return;          // double-garde
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data) {
      doScan(code.data);  // doScan pose scanning=false → la boucle s'arrête
      return;             // ne pas re-scheduler
    }
  }
  requestAnimationFrame(tick);
}

window.addEventListener('beforeunload', stopCam);
</script>
</body></html>
